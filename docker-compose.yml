services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lidocrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lidocrm}
      POSTGRES_DB: ${POSTGRES_DB:-lidocrm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: alembic upgrade head
    environment: &app_db
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lidocrm}:${POSTGRES_PASSWORD:-lidocrm}@postgres:5432/${POSTGRES_DB:-lidocrm}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      <<: *app_db
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  bot:
    build: .
    command: python -m app.bot.main
    environment:
      <<: *app_db
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
