services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lidocrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lidocrm}
      POSTGRES_DB: ${POSTGRES_DB:-lidocrm}
    # Раскомментируйте, если с хоста нужен psql/alembic к этому инстансу (тогда .env: localhost:5432)
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: alembic upgrade head
    environment: &app_db
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lidocrm}:${POSTGRES_PASSWORD:-lidocrm}@postgres:5432/${POSTGRES_DB:-lidocrm}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    # DATABASE_URL с хоста `localhost` в .env — для контейнера неверен: после <<: идут явные ключи
    environment:
      <<: *app_db
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lidocrm}:${POSTGRES_PASSWORD:-lidocrm}@postgres:5432/${POSTGRES_DB:-lidocrm}
      DEV: ${DEV:-false}
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  bot:
    build: .
    command: python -m app.bot.main
    environment:
      <<: *app_db
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lidocrm}:${POSTGRES_PASSWORD:-lidocrm}@postgres:5432/${POSTGRES_DB:-lidocrm}
      DEV: ${DEV:-false}
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Прод-UI: собранный SPA + nginx (не SSR; см. frontend/Dockerfile). Браузер: http://localhost:${WEB_PORT:-8080}
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # Vite (только разработка). `docker compose --profile dev up`
  frontend:
    profiles: [dev]
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      API_PROXY_TARGET: http://api:8000
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  frontend_node_modules:
