# Пример для /etc/nginx/sites-available/lidocrm (симлинк в sites-enabled).
# Скопируйте dist: cd frontend && npm ci && npm run build
# sudo mkdir -p /var/www/lidocrm && sudo cp -r dist/* /var/www/lidocrm/
# API из docker compose слушает 127.0.0.1:8000 (см. docker-compose.yml).

server {
    listen 80;
    server_name crm.example.com;
    root /var/www/lidocrm;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
